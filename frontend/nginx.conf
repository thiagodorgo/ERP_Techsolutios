# Ω-INFRA-1 — nginx do frontend: SPA estático + proxy same-origin de /api/v1 para o backend.
server {
  listen 8080;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # Compressão de texto.
  gzip on;
  gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;
  gzip_min_length 1024;

  # Assets com hash → cache longo.
  location /assets/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
    try_files $uri =404;
  }

  # API same-origin → proxy para o serviço de backend (nome do serviço no compose.prod / rota do provedor).
  # `api` e a porta 3000 são o alvo do docker-compose.prod.yml; em produção o roteamento é por provedor (PR5/6).
  location /api/ {
    proxy_pass http://api:3000;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  # SPA fallback — rotas do React caem no index.html.
  location / {
    try_files $uri $uri/ /index.html;
  }
}
