# Ω-INFRA-3 — config-as-code do FRONTEND (nginx estático) em PRODUÇÃO (Fly.io, gru). INERTE até ativação.
# O web NÃO tem imagem no GHCR (o job docker do ci.yml builda só o backend) → o CD builda o web a partir
# do SHA fixado (promote_sha). Rollback do web = `fly releases -c frontend/fly.production.toml` (release
# anterior nativo do Fly) — o rollback-por-imagem-GHCR não se aplica ao web (gap P-SAN-PROD-WEBIMG,
# registrado como follow-up: publicar a imagem do web no GHCR para simetria total do rollback).
# Pré-requisito de rede: `fly ips allocate-v6 --private -a erp-techsolutions-api-production` (endereço
# .flycast do backend para o proxy interno). Nada de segredo aqui.

app = "erp-techsolutions-web-production"
primary_region = "gru"

[build]
  dockerfile = "Dockerfile"
  [build.args]
    VITE_API_BASE_URL = "/api/v1"
    VITE_USE_MOCKS = "false"

[env]
  # Proxy same-origin /api → backend de PRODUÇÃO pela rede PRIVADA do Fly (.flycast). Sem tráfego
  # público entre apps — por isso o CORS público do backend é para a origem web, não para app→app.
  API_UPSTREAM = "http://erp-techsolutions-api-production.flycast"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1

  [[http_service.checks]]
    interval = "30s"
    timeout = "4s"
    grace_period = "15s"
    method = "GET"
    path = "/"

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"
