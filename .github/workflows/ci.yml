name: ci

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

jobs:
  backend:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/erp_techsolutions?schema=public

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npm run db:generate

      - name: TypeScript check
        run: npm run check

      - name: Tests
        run: npm test

      - name: Build
        run: npm run build

  frontend:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm --prefix frontend ci

      - name: TypeScript check
        run: npm --prefix frontend run check

      - name: Smoke tests
        run: npm --prefix frontend run test:smoke

      - name: Build
        run: npm --prefix frontend run build

  flutter:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install dependencies
        run: flutter pub get
        working-directory: mobile/flutter_app

      - name: Format check
        run: dart format --output=none --set-exit-if-changed lib test
        working-directory: mobile/flutter_app

      - name: Analyze
        run: flutter analyze
        working-directory: mobile/flutter_app

      - name: Tests
        run: flutter test --reporter compact
        working-directory: mobile/flutter_app
